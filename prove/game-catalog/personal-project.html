<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Video Game Catalog</title>
	<link rel="stylesheet" href="personal-project.css">
	<script src="personal-project.js" defer></script>
	<link rel="icon" href="images/favicon.png">
</head>
<body>
<header>
	<a class="main-a" href="personal-project.html"><img class="main-logo" src="images/logo-transparent-512.png" alt="Main Logo"></a>
	<search class="search-container">
		<form action="" class="search-form">
			<input type="search" class="search-input" aria-label="Search Games" placeholder="Find a game">
			<button type="submit" class="search-submit" aria-label="Search submit">
				<svg class="search-svg" viewBox="0 0 24 24">
					<circle cx="11" cy="11" r="8"></circle>
					<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
				</svg>
			</button>
		</form>
	</search>
	<nav>
		<ul>
			<li><a class="random-picker" href="personal-project.html">Random Game Picker</a></li>
			<li><a href="app-plan.html">App Plan</a></li>
		</ul>
	</nav>
</header>
<main>
	<section class="games-container">
		<dialog>
			<button class="close-viewer">X</button>
			<div class="modal-content">
				<img src="" alt="">
				<div class="modal-text">
					<h2 class="gameTitle"></h2>
					<p class="gamePlatforms"></p>
					<p class="gameDesc"></p>
					<p class="gameScore"></p>
				</div>
			</div>
		</dialog>
	</section>
</main>
<footer>
	<p>Michael Hoffman</p>
	<div class="social-container">
		<a href="https://www.instagram.com/"><img src="images/instagram_icon.svg" alt="Instagram"></a>
		<a href="https://www.youtube.com/"><img src="images/youtube_icon.svg" alt="YouTube"></a>
		<a href="https://www.facebook.com/"><img src="images/facebook_icon.svg" alt="Facebook"></a>
	</div>
</footer>
</body>
</html>
