<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Event</title>
	<link rel="stylesheet" href="event-form.css">
	<script src="event-form.js" defer></script>
</head>
<body>
	<main>
		<div class="main-container">
			<h1>Event Ticket</h1>
			<form action="/ticket" method="post" class="form-container">
				<div class="fname">
					<label for="fname2">First Name</label><br>
					<input type="text" id="fname2" class="input-box" name="fname"><br>
				</div>
				<div class="lname">
					<label for="lname2">Last Name</label><br>
					<input type="text" id="lname2" class="input-box" name="lname"><br>
				</div>
				<div class="email">
					<label for="email2">Email</label><br>
					<input type="email" id="email2" name="email"><br>
				</div>
				<div class="type">
					<label for="type2">Type</label><br>
					<select name="type" id="type2" class="input-box">
						<option value="chooseOne">Choose one</option>
						<option value="student">Student</option>
						<option value="guest">Guest</option>
					</select><br>
				</div>
				<div class="date">
					<label for="date2">Event Date</label><br>
					<input type="date" id="date2" class="input-box" name="date"><br>
				</div>
				<input type="submit" id="submit" class="submit" value="Create Ticket">
			</form>
		</div>
	</main>
</body>
</html>
