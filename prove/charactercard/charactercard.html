<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Character Card</title>
	<link rel="stylesheet" href="charactercard.css">
	<script src="charactercard.js" defer></script>
	<!-- Open Graph (Facebook, LinkedIn, etc.) -->
	<meta property="og:type" content="website">
	<meta property="og:title" content="Character Card">
	<meta property="og:description" content="A character card that will let you attack and defend.">
	<meta property="og:url" content="https://unteachablegame.github.io/wdd131/prove/charactercard/charactercard.html">
	<meta property="og:image" content="images/favicon_io/android-chrome-512x512.png">

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Character Card">
	<meta name="twitter:description" content="A character card that will let you attack and defend.">
	<meta name="twitter:image" content="images/favicon_io/android-chrome-512x512.png">

	<!-- One favicon (ICO works everywhere) -->
	<link rel="icon" href="images/favicon_io/favicon.ico">

	<!-- One Apple Touch Icon (iOS home screen) -->
	<link rel="apple-touch-icon" href="images/favicon_io/apple-touch-icon.png">
</head>
<body>
	<main>
		<section class="cards-container">
			<section class="card">
				<img class="image" src="images/snortleblat.webp" alt="Snortleblat">
				<h2 class="name">Snortleblat</h2>
				<div class="stats">
					<p><strong>Class: </strong><span id="class">Swamp Beast Diplomat</span></p>
					<p><strong>Level: </strong><span id="level">5</span></p>
					<p><strong>Health: </strong><span id="health">100</span></p>
				</div>
				<div class="buttons">
					<button id="attacked" type="submit">Attacked</button>
					<button id="levelUp" type="submit">Level Up</button>
				</div>
			</section>
		</section>
	</main>
</body>
</html>
